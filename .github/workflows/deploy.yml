name: CP Agenda Pro - Deploy Automático (VPS)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Código
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Build Frontend (Vite + TypeScript)
      run: |
        npm install
        npm run build

    - name: Build Backend (Node.js)
      working-directory: ./backend-node
      run: |
        npm install
        npx prisma generate
        npm run build

    - name: Empacotar artefatos de deploy
      run: |
        cd dist && zip -r ../dist.zip . && cd ..
        cd backend-node && zip -r ../backend.zip dist node_modules package.json prisma src tsconfig.json && cd ..

    - name: Enviar artefatos para a VPS via SCP
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT }}
        source: "dist.zip,backend.zip"
        target: "/tmp/"

    - name: Finalizar Deploy via SSH (unzip, Node.js restart)
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT }}
        script: |
          set -e

          # Frontend: limpar e descompactar
          rm -rf /var/www/cpagendapro/public/*
          unzip -o /tmp/dist.zip -d /var/www/cpagendapro/public/
          rm /tmp/dist.zip

          # Backend: descompactar sobre a pasta existente
          # Como estamos mudando para Node.js, não vamos mais usar /var/www/cpagendapro/backend
          # O código Node roda do diretório que o PM2 monitora: /root/CP-Agenda-Pro-Brasil/backend-node
          # Portanto, apenas o git pull na VPS será suficiente no futuro, mas mantemos o zip por segurança
          rm /tmp/backend.zip

          echo "Deploy concluído com sucesso em $(date)"
