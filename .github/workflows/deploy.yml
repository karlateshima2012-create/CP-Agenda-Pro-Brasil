name: Deploy — CP Agenda Pro

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build e deploy
    runs-on: self-hosted
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build — frontend
        run: |
          npm ci
          npm run build

      - name: Build — backend
        working-directory: ./backend-node
        run: |
          npm ci
          npx prisma generate
          npm run build

      - name: Deploy — frontend
        run: |
          rm -rf /var/www/cpagendapro/public/*
          cp -r dist/. /var/www/cpagendapro/public/

      - name: Deploy — backend
        run: |
          BACKEND=/root/CP-Agenda-Pro-Brasil/backend-node

          rm -rf "$BACKEND/dist"
          cp -r backend-node/dist "$BACKEND/"
          cp backend-node/package.json      "$BACKEND/"
          cp backend-node/package-lock.json "$BACKEND/"
          cp backend-node/prisma/schema.prisma "$BACKEND/prisma/"

          cd "$BACKEND"
          npm ci --omit=dev
          npx prisma db push
          npx prisma generate
          pm2 restart cpagenda-backend --update-env

      - name: Confirmar deploy
        run: |
          echo "Deploy concluído: $(date '+%d/%m/%Y %H:%M:%S')"
          pm2 list
