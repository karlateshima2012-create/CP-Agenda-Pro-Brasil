name: CP Agenda Pro - Deploy Automático (VPS)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Código
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Build Frontend (Vite + TypeScript)
      run: |
        npm install
        npm run build

    - name: Configurar PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        tools: composer:v2

    - name: Instalar dependências PHP completas (para PHPStan)
      working-directory: ./backend
      run: composer install --optimize-autoloader --ignore-platform-reqs --no-interaction

    - name: Análise Estática (PHPStan — bloqueia deploy em caso de erro de tipagem)
      working-directory: ./backend
      run: ./vendor/bin/phpstan analyse --error-format=github

    - name: Remover dependências de desenvolvimento
      working-directory: ./backend
      run: composer install --no-dev --optimize-autoloader --ignore-platform-reqs --no-interaction

    - name: Gerar .env de produção a partir dos GitHub Secrets
      env:
        SECRET_DB_HOST: ${{ secrets.DB_HOST }}
        SECRET_DB_PORT: ${{ secrets.DB_PORT }}
        SECRET_DB_NAME: ${{ secrets.DB_NAME }}
        SECRET_DB_USER: ${{ secrets.DB_USER }}
        SECRET_DB_PASS: ${{ secrets.DB_PASS }}
        SECRET_TELEGRAM: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        SECRET_TELEGRAM_MONITOR: ${{ secrets.TELEGRAM_MONITOR_TOKEN }}
        SECRET_TELEGRAM_ERROR_CHAT_ID: ${{ secrets.TELEGRAM_ERROR_CHAT_ID }}
        SECRET_SMTP_USER: ${{ secrets.SMTP_USER }}
        SECRET_SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        SECRET_SMTP_FROM: ${{ secrets.SMTP_FROM }}
        SECRET_SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME }}
      run: |
        echo "DB_HOST=${SECRET_DB_HOST}" > backend/.env
        echo "DB_PORT=${SECRET_DB_PORT}" >> backend/.env
        echo "DB_NAME=${SECRET_DB_NAME}" >> backend/.env
        echo "DB_USER=${SECRET_DB_USER}" >> backend/.env
        echo "DB_PASS=${SECRET_DB_PASS}" >> backend/.env
        echo "DB_CHARSET=utf8mb4" >> backend/.env
        echo "API_VERSION=1.0.0" >> backend/.env
        echo "DEBUG_MODE=false" >> backend/.env
        echo "TELEGRAM_BOT_TOKEN=${SECRET_TELEGRAM}" >> backend/.env
        echo "TELEGRAM_MONITOR_TOKEN=${SECRET_TELEGRAM_MONITOR}" >> backend/.env
        echo "TELEGRAM_ERROR_CHAT_ID=${SECRET_TELEGRAM_ERROR_CHAT_ID}" >> backend/.env
        echo "SMTP_HOST=smtp.hostinger.com" >> backend/.env
        echo "SMTP_PORT=465" >> backend/.env
        echo "SMTP_USER=${SECRET_SMTP_USER}" >> backend/.env
        echo "SMTP_PASSWORD=${SECRET_SMTP_PASSWORD}" >> backend/.env
        echo "SMTP_FROM=${SECRET_SMTP_FROM}" >> backend/.env
        echo "SMTP_FROM_NAME=${SECRET_SMTP_FROM_NAME}" >> backend/.env
        echo ".env gerado com $(wc -l < backend/.env) linhas"

    - name: Empacotar artefatos de deploy
      run: |
        cd dist && zip -r ../dist.zip . && cd ..
        cd backend && zip -r ../backend.zip api database migrate.php .env vendor && cd ..

    - name: Enviar artefatos para a VPS via SCP
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT }}
        source: "dist.zip,backend.zip"
        target: "/tmp/"

    - name: Finalizar Deploy via SSH (unzip, migrations, reload PHP-FPM)
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT }}
        script: |
          set -e

          # Backend: descompactar sobre a pasta existente
          unzip -o /tmp/backend.zip -d /var/www/cpagendapro/backend/
          rm /tmp/backend.zip
          chmod 640 /var/www/cpagendapro/backend/.env

          # Frontend: limpar e descompactar
          rm -rf /var/www/cpagendapro/public/*
          unzip -o /tmp/dist.zip -d /var/www/cpagendapro/public/
          rm /tmp/dist.zip

          # Migrations (idempotente — seguro rodar em todo deploy)
          php /var/www/cpagendapro/backend/migrate.php

          # Recarregar PHP-FPM para limpar opcache
          sudo systemctl reload php8.3-fpm

          echo "Deploy concluído com sucesso em $(date)"
